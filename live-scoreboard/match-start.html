<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Match Starting Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/match-start.css">
</head>
<body class="match-start-page">

  <main class="match-start-container">
    <h1 id="matchText">The match will start soon!</h1>
    <div class="teams-preview">
      <div class="team-preview">
        <img id="teamAImg" alt="Team A Logo">
        <div id="teamAName">Team A</div>
      </div>
      <div class="vs-text">VS</div>
      <div class="team-preview">
        <img id="teamBImg" alt="Team B Logo">
        <div id="teamBName">Team B</div>
      </div>
    </div>
    <div id="countdown" class="countdown">10</div>
  </main>

  <script src="js/match-start-ui.js"></script>
</body>
</html>
